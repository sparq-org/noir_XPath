[package]
name = "xpath"
version = "0.2.0"
type = "lib"
authors = ["jeswr"]
# compiler_version omitted: nargo only accepts full release versions (not beta)
# Verified compatible with nargo 1.0.0-beta.21 (noirc 89a0f0fa)

[dependencies]
# Float dep migrated from vendored noir_IEEE754 v0.3.1 to the optimized
# sparq_ieee754 library in this repo (see ../VENDOR.md "Migration" section).
sparq_ieee754 = { path = "../vendor/ieee754" }
# Vendored copy of upstream git dep (see ../vendor/json_parser/VENDOR-PROVENANCE.md).
# Upstream pin was: json_parser = noir-lang/noir_json_parser@main (floating).
json_parser = { path = "../vendor/json_parser" }
