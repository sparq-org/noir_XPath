name: CI

# Minimal CI for the published standalone face of noir_XPath.
# Development happens in https://github.com/sparq-org/sparq under zk/xpath;
# this repo is a mirror/publication target. See README.md.
#
# Pinned toolchain: nargo 1.0.0-beta.21 (single version -- no version matrix).
# Actions are SHA-pinned.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NARGO_VERSION: "1.0.0-beta.21"

jobs:
  test:
    name: nargo test (real suite)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Noir (pinned)
        uses: noir-lang/noirup@7dbe69ccc78877f0200ffa5a40836c953d2cfd8f # v0.1.4
        with:
          toolchain: ${{ env.NARGO_VERSION }}

      - name: Verify pinned toolchain
        run: |
          set -euo pipefail
          nargo --version
          nargo --version | grep -q "${NARGO_VERSION}" \
            || { echo "::error::nargo is not the pinned ${NARGO_VERSION}"; exit 1; }

      - name: Run real test suite (lib + unit tests + real test_packages)
        run: bash scripts/run_real_tests.sh
