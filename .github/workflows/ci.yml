# CI workflow for noir_XPath.
#
# NOTE: this file is rendered from
# `zkp-sparql-workspace/templates/sub-repo/noir/.github/workflows/ci.yml.tmpl`
# but currently carries local edits to use this repo's package names
# (`xpath` / `xpath_unit_tests`) rather than the canonical's hard-coded
# `ieee754` / `ieee754_unit_tests`. The next phase of the cross-repo
# consistency plan introduces `${PACKAGE_NAME}` / `${UNIT_TEST_PACKAGE}`
# substitution in the renderer; once that lands, re-running
# `scripts/sync-standards.sh` will reproduce these edits from the canonical
# without manual intervention. Tracked in
# zkp-sparql-workspace `STABILISATION-TODOS.md` (Template-substitution gaps).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # Read Noir versions from config file
  setup:
    runs-on: ubuntu-latest
    outputs:
      noir-versions: ${{ steps.versions.outputs.versions }}
      latest-version: ${{ steps.versions.outputs.latest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Read Noir versions
        id: versions
        run: |
          VERSIONS=$(jq -c '.versions' .github/noir-versions.json)
          LATEST=$(jq -r '.latest' .github/noir-versions.json)
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "Noir versions: $VERSIONS"
          echo "Latest version: $LATEST"

  # Lint and format check
  lint:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        noir-version: ${{ fromJson(needs.setup.outputs.noir-versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Noir
        uses: noir-lang/noirup@v0.1.4
        with:
          toolchain: ${{ matrix.noir-version }}

      - name: Check format
        run: nargo fmt --check --package xpath

  # Run unit tests on all Noir versions
  unit-tests:
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        noir-version: ${{ fromJson(needs.setup.outputs.noir-versions) }}
    name: unit-tests (${{ matrix.noir-version }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Noir
        uses: noir-lang/noirup@v0.1.4
        with:
          toolchain: ${{ matrix.noir-version }}

      - name: Run unit tests
        run: |
          echo "Running unit tests"
          nargo test --package xpath_unit_tests || exit 1


  # Summary job that depends on all test jobs
  test-summary:
    runs-on: ubuntu-latest
    needs: [setup, lint, unit-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.setup.result }}" != "success" ]; then
            echo "Setup failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          echo "All checks passed!"
